<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ABQ Mission Clock</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow:hidden;
}

/* SIDE PANELS */
.side{
position:absolute;
width:22%;
text-align:center;
}
.topSide{ top:8%; }
.bottomSide{ bottom:10%; }
#leftTop{ left:2%; }
#rightTop{ right:2%; }
#leftBottom{ left:2%; }
#rightBottom{ right:2%; }

.label{ font-size:26px;color:#aaa;margin-bottom:8px; }
.icon{ font-size:60px;margin-bottom:8px; }
.temp,.time{ font-size:36px; }

/* CENTER */
#center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
}
#city{ color:#4da6ff;font-size:70px; }
#temp{ font-size:100px; }
#updated{ font-size:20px;color:#888;margin-bottom:10px; }
#clock{ font-size:220px;color:#39ff14; }
#date{ font-size:50px;margin-top:-20px; }
</style>
</head>

<body>

<!-- WEATHER -->
<div id="leftTop" class="side topSide">
<div class="label">Today</div>
<div id="todayIcon" class="icon">--</div>
<div id="todayTemp" class="temp">--</div>
</div>

<div id="rightTop" class="side topSide">
<div class="label">Tomorrow</div>
<div id="tomorrowIcon" class="icon">--</div>
<div id="tomorrowTemp" class="temp">--</div>
</div>

<!-- SUN -->
<div id="leftBottom" class="side bottomSide">
<div class="label">Sunrise</div>
<div class="icon">🌅</div>
<div id="sunrise" class="time">--:--</div>
</div>

<div id="rightBottom" class="side bottomSide">
<div class="label">Sunset</div>
<div class="icon">🌇</div>
<div id="sunset" class="time">--:--</div>
</div>

<!-- CENTER -->
<div id="center">
<div id="city">Albuquerque</div>
<div id="temp">--°F</div>
<div id="updated"></div>
<div id="clock">--:--</div>
<div id="date"></div>
</div>

<script>

function formatTime(d){
  var h=d.getHours(), m=d.getMinutes(), a="AM";
  if(h>=12){a="PM";}
  if(h>12){h-=12;}
  if(h==0){h=12;}
  if(m<10){m="0"+m;}
  return h+":"+m+" "+a;
}

/* CLOCK */
setInterval(function(){
  var n=new Date();
  document.getElementById("clock").innerHTML=formatTime(n);
  document.getElementById("date").innerHTML=n.toDateString();
},1000);

/* ICON */
function getIcon(c){
  if(c==0)return"☀️";
  if(c<=3)return"⛅";
  if(c<=48)return"☁️";
  if(c<=67)return"🌧️";
  return"⛈️";
}

/* COLOR */
function getColor(t){
  if(t>=90)return"#ff4444";
  if(t>=70)return"#ffaa00";
  if(t>=50)return"#66ccff";
  return"#3399ff";
}
function fmt(h,l){
  return "<span style='color:"+getColor(h)+"'>"+h+"°</span> / "+
         "<span style='color:"+getColor(l)+"'>"+l+"°</span>";
}

/* CURRENT TEMP (FAST) */
function updateCurrentTemp(){
fetch("https://api.open-meteo.com/v1/forecast?latitude=35.0844&longitude=-106.6504&current_weather=true&temperature_unit=fahrenheit&timezone=auto")
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerHTML=Math.round(d.current_weather.temperature)+"°F";
  document.getElementById("updated").innerHTML="Updated "+formatTime(new Date());
});
}

/* FORECAST + SUN (SLOW) */
function updateMeta(){
fetch("https://api.open-meteo.com/v1/forecast?latitude=35.0844&longitude=-106.6504&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset&temperature_unit=fahrenheit&timezone=auto")
.then(r=>r.json())
.then(d=>{
  document.getElementById("todayIcon").innerHTML=getIcon(d.daily.weathercode[0]);
  document.getElementById("todayTemp").innerHTML=fmt(
    Math.round(d.daily.temperature_2m_max[0]),
    Math.round(d.daily.temperature_2m_min[0])
  );

  document.getElementById("tomorrowIcon").innerHTML=getIcon(d.daily.weathercode[1]);
  document.getElementById("tomorrowTemp").innerHTML=fmt(
    Math.round(d.daily.temperature_2m_max[1]),
    Math.round(d.daily.temperature_2m_min[1])
  );

  document.getElementById("sunrise").innerHTML=formatTime(new Date(d.daily.sunrise[0]));
  document.getElementById("sunset").innerHTML=formatTime(new Date(d.daily.sunset[0]));
});
}

/* INIT */
updateCurrentTemp();
updateMeta();

/* INTERVALS */
setInterval(updateCurrentTemp,300000);   // 5 min

setTimeout(function(){
  updateMeta();
  setInterval(updateMeta,3600000);      // 1 hour
},15000); // stagger 15s

</script>

</body>
</html>
