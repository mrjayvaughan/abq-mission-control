<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ABQ Mission Clock</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow:hidden;
transition: transform 1s linear;
}

#container{
display:flex;
flex-direction:column;
justify-content:center; /* center now that forecast is gone */
height:100vh;
}

/* TOP */
#top{
margin-top:10px;
}

#city{
color:#4da6ff;
font-size:70px;
}

#temp{
font-size:100px;
margin-bottom:0;
}

#updated{
font-size:20px;
color:#888;
margin-bottom:-10px;
}

/* MIDDLE */
#middle{
margin-top:10px;
}

#clock{
font-size:220px;
color:#39ff14;
}

#date{
font-size:50px;
margin-top:-20px;
}
</style>
</head>

<body onclick="goFullscreen()">

<div id="container">

<div id="top">
<div id="city">Albuquerque</div>
<div id="temp">--°F</div>
<div id="updated"></div>
</div>

<div id="middle">
<div id="clock">--:--</div>
<div id="date"></div>
</div>

</div>

<script>

/* FULLSCREEN */
function goFullscreen(){
  var el = document.documentElement;
  if(el.requestFullscreen){ el.requestFullscreen(); }
  else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
}

/* KEEP AWAKE */
setInterval(function(){ window.scrollTo(0,1); },30000);

/* CLOCK */
var showColon = true;

function updateClock(){
  var now=new Date();
  var h=now.getHours();
  var m=now.getMinutes();
  var ampm="AM";

  if(h>=12){ampm="PM";}
  if(h>12){h=h-12;}
  if(h==0){h=12;}
  if(m<10){m="0"+m;}

  var colon = showColon ? ":" : " ";
  showColon = !showColon;

  document.getElementById("clock").innerHTML =
    h + colon + m + " " + ampm;

  document.getElementById("date").innerHTML =
    now.toDateString();
}

setInterval(updateClock,1000);
updateClock();

/* FORMAT TIME */
function formatTime(d){
  var h=d.getHours();
  var m=d.getMinutes();
  var ampm="AM";
  if(h>=12){ampm="PM";}
  if(h>12){h=h-12;}
  if(h==0){h=12;}
  if(m<10){m="0"+m;}
  return h+":"+m+" "+ampm;
}

/* TEMP */
function updateCurrentTemp(){
  var xhr=new XMLHttpRequest();

  xhr.open(
    "GET",
    "https://api.open-meteo.com/v1/forecast?latitude=35.0844&longitude=-106.6504&current_weather=true&temperature_unit=fahrenheit&timezone=auto",
    true
  );

  xhr.onload=function(){
    if(xhr.status===200){
      var data=JSON.parse(xhr.responseText);
      document.getElementById("temp").innerHTML =
        Math.round(data.current_weather.temperature)+"°F";
      document.getElementById("updated").innerHTML =
        "Updated " + formatTime(new Date());
    }
  };

  xhr.send();
}

/* INIT */
updateCurrentTemp();
setInterval(updateCurrentTemp,120000);

/* BURN IN SHIFT */
var shift=0;
setInterval(function(){
  shift=(shift+1)%10;
  document.body.style.transform =
    "translate("+shift+"px,"+shift+"px)";
},60000);

</script>

</body>
</html>
